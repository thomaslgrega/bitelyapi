name: Go format

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          test -z "$(gofmt -l .)"